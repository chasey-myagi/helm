<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>helm</title>
<script>try{var t=localStorage.getItem("helm-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}</script>
<style>:root{
  --paper:oklch(0.975 0.006 300); --surface:oklch(0.993 0.004 300); --sunken:oklch(0.953 0.009 298);
  --line:oklch(0.905 0.012 298); --line-soft:oklch(0.925 0.010 298);
  --ink:oklch(0.285 0.014 296); --ink-muted:oklch(0.560 0.012 296); --ink-faint:oklch(0.705 0.010 297);
  --accent:oklch(0.605 0.150 298); --accent-ink:oklch(0.500 0.160 298);
  --run:oklch(0.625 0.158 300); --ok:oklch(0.615 0.110 150); --warn:oklch(0.740 0.110 85);
  --warn-ink:oklch(0.520 0.110 80); --block:oklch(0.575 0.165 27); --info:oklch(0.560 0.090 235);
  --sans:-apple-system,"Inter",system-ui,"Segoe UI",sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace; --r:10px;
}
[data-theme="dark"]{
  --paper:oklch(0.205 0.014 296); --surface:oklch(0.255 0.014 296); --sunken:oklch(0.235 0.014 297);
  --line:oklch(0.335 0.014 297); --line-soft:oklch(0.305 0.014 297);
  --ink:oklch(0.925 0.010 300); --ink-muted:oklch(0.705 0.012 298); --ink-faint:oklch(0.565 0.012 297);
  --accent:oklch(0.770 0.130 300); --accent-ink:oklch(0.825 0.115 302);
  --run:oklch(0.780 0.135 302); --ok:oklch(0.700 0.110 152); --warn:oklch(0.800 0.105 88);
  --warn-ink:oklch(0.825 0.100 86); --block:oklch(0.680 0.150 28); --info:oklch(0.700 0.090 235);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55;font-size:15px}

.banner{display:none;background:color-mix(in oklch,var(--warn) 22%,var(--surface));color:var(--warn-ink);
  font-size:13px;text-align:center;padding:7px 16px;border-bottom:1px solid color-mix(in oklch,var(--warn) 40%,var(--line))}
body.lost .banner{display:block}
body.lost .chip.run .dot,body.lost .dot.live{animation:none;opacity:.4}

.topline{height:2px;background:var(--line-soft)}
.topline>i{display:block;height:100%;width:0;background:var(--run);transition:width .5s ease}

header{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:10px 28px;border-bottom:1px solid var(--line)}
.h-left{display:flex;align-items:baseline;gap:12px;min-width:0}
.h-title{font-size:17px;font-weight:650;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-task{font-size:13px;color:var(--ink-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-right{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:12px;color:var(--ink-muted);flex:0 0 auto}
.h-stat{display:inline-flex;align-items:center;gap:5px}
.iconbtn{width:28px;height:28px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink-muted);font-size:13px;cursor:pointer;display:grid;place-items:center}
.iconbtn:hover{border-color:var(--accent)}
.iconbtn.on{border-color:var(--accent);color:var(--accent-ink)}

.empty{padding:5rem 1.5rem;text-align:center;color:var(--ink-muted);font-size:15px}
.empty code{font-family:var(--mono);font-size:.85em;background:var(--sunken);padding:2px 7px;border-radius:6px;color:var(--accent-ink)}

.wrap{display:grid;grid-template-columns:minmax(320px,372px) 1fr;align-items:start}
.col-left{padding:16px 24px 22px;border-right:1px solid var(--line);position:sticky;top:0;display:flex;flex-direction:column;gap:16px}
.col-right{padding:16px 28px 28px;display:flex;flex-direction:column;gap:18px}

.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.eyebrow .ct{background:var(--sunken);color:var(--ink-muted);padding:1px 7px;border-radius:99px;letter-spacing:.04em}

.now-line{font-size:21px;font-weight:600;letter-spacing:-.015em;line-height:1.3}
.now-meta{margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.now-step{font-family:var(--mono);font-size:12.5px;color:var(--ink-muted)}
.now-step b{color:var(--accent-ink);font-weight:600}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:3px 10px;border-radius:99px;border:1px solid transparent;text-transform:capitalize}
.chip .dot{width:7px;height:7px;border-radius:50%}
.chip.run{color:var(--run);background:color-mix(in oklch,var(--run) 13%,var(--surface));border-color:color-mix(in oklch,var(--run) 26%,transparent)}
.chip.run .dot{background:var(--run);animation:pulse 1.6s infinite}
.chip.blocked{color:var(--block);background:color-mix(in oklch,var(--block) 13%,var(--surface));border-color:color-mix(in oklch,var(--block) 28%,transparent)}
.chip.blocked .dot{background:var(--block)}
.chip.waiting{color:var(--warn-ink);background:color-mix(in oklch,var(--warn) 15%,var(--surface));border-color:color-mix(in oklch,var(--warn) 32%,transparent)}
.chip.waiting .dot{background:var(--warn)}
.chip.done{color:var(--ok);background:color-mix(in oklch,var(--ok) 14%,var(--surface));border-color:color-mix(in oklch,var(--ok) 28%,transparent)}
.chip.done .dot{background:var(--ok)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.28}}

.plan{list-style:none;display:flex;flex-direction:column}
.plan li{display:flex;gap:11px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line-soft);font-size:14px}
.plan li:last-child{border-bottom:none}
.plan .mk{flex:0 0 16px;width:16px;height:16px;border-radius:50%;margin-top:2px;border:1.5px solid var(--ink-faint);display:grid;place-items:center;font-size:10px;color:transparent}
.plan .n{font-family:var(--mono);font-size:11px;color:var(--ink-faint);flex:0 0 auto;margin-top:2px}
.plan li.done{color:var(--ink-muted)}
.plan li.done .mk{border-color:var(--ok);background:color-mix(in oklch,var(--ok) 16%,transparent);color:var(--ok)}
.plan li.done .t{text-decoration:line-through;text-decoration-color:var(--ink-faint)}
.plan li.active{margin:2px -10px;padding:9px 10px;background:color-mix(in oklch,var(--run) 8%,var(--surface));border:1px solid color-mix(in oklch,var(--run) 20%,transparent);border-radius:8px;font-weight:600}
.plan li.active .mk{border-color:var(--run);background:var(--run)}
.plan li.active .mk::after{content:"";width:5px;height:5px;border-radius:50%;background:var(--surface)}

.steer{border:1px solid color-mix(in oklch,var(--accent) 34%,var(--line));background:color-mix(in oklch,var(--accent) 5%,var(--surface));border-radius:var(--r);padding:13px 14px 14px}
.steer .eyebrow{color:var(--accent-ink)}
.field+.field{margin-top:11px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--ink-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.field .box{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13.5px;min-height:34px;white-space:pre-wrap;outline:none}
.field .box:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in oklch,var(--accent) 18%,transparent)}
.field .box.goal{font-weight:550}
.field .box.steer-note{font-family:var(--mono);font-size:12.5px;color:var(--ink-muted)}
.field .box:empty::before{content:attr(data-ph);color:var(--ink-faint)}
.steer-foot{margin-top:11px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ink-faint);font-family:var(--mono);gap:8px}
.steer-foot .hint{display:inline-flex;align-items:center;gap:5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.steer-foot .hint .d{width:6px;height:6px;border-radius:50%;background:var(--ok);flex:0 0 auto}
.steer-foot.dirty .hint .d{background:var(--warn)}
.savebtn{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--accent-ink);background:color-mix(in oklch,var(--accent) 12%,var(--surface));border:1px solid color-mix(in oklch,var(--accent) 30%,transparent);border-radius:7px;padding:4px 11px;cursor:pointer;flex:0 0 auto;opacity:.5;pointer-events:none}
.steer-foot.dirty .savebtn{opacity:1;pointer-events:auto}

.needs{border:1px solid color-mix(in oklch,var(--warn) 42%,var(--line));background:color-mix(in oklch,var(--warn) 11%,var(--surface));border-radius:var(--r);padding:13px 14px}
.needs h3{font-size:13px;font-weight:700;color:var(--warn-ink);display:flex;align-items:center;gap:8px;margin-bottom:8px}
.needs h3 .badge{margin-left:auto;font-family:var(--mono);font-size:11px;background:var(--warn-ink);color:var(--paper);border-radius:99px;padding:1px 7px}
.needs ol{padding-left:18px;font-size:13.5px}
.needs li{margin:3px 0}

.sec-h{font-size:13px;font-weight:700;letter-spacing:-.005em;margin-bottom:13px;display:flex;align-items:baseline;gap:9px}
.sec-h .ic{color:var(--ink-faint);font-weight:400}
.sec-h .meta{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-faint)}

.tl{position:relative;padding-left:22px}
.tl::before{content:"";position:absolute;left:5px;top:6px;bottom:6px;width:1.5px;background:var(--line)}
.tl-item{position:relative;padding:0 0 16px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-22px;top:3px;width:12px;height:12px;border-radius:50%;border:3px solid var(--paper)}
.tl-time{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint)}
.tl-text{font-size:14px;margin-top:1px}
.tl-text code,.dec code{font-family:var(--mono);font-size:.85em;background:var(--sunken);padding:1px 5px;border-radius:5px;color:var(--accent-ink)}
.legend{display:flex;flex-wrap:wrap;gap:.4rem 1rem;align-items:center;padding:.5rem .85rem;background:var(--sunken);border-radius:var(--r);font-size:11.5px;margin-bottom:.9rem;color:var(--ink-muted)}
.legend i{display:inline-flex;align-items:center;gap:5px;font-style:normal}
.legend .sw{width:9px;height:9px;border-radius:50%}

.dec{list-style:none;display:flex;flex-direction:column;gap:9px}
.dec li{display:flex;gap:10px;align-items:flex-start;font-size:14px}
.dec .lead{flex:0 0 auto;margin-top:7px;width:6px;height:6px;border-radius:50%;background:var(--ink-faint)}
.dec li.asm .lead{background:var(--warn)}
.tag{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.03em;padding:1px 6px;border-radius:5px;margin-left:7px;white-space:nowrap;
  color:var(--warn-ink);border:1px solid color-mix(in oklch,var(--warn) 45%,transparent);background:color-mix(in oklch,var(--warn) 12%,transparent)}

.arts{display:flex;flex-wrap:wrap;gap:9px;align-items:center}
.linkchip{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--accent-ink);text-decoration:none;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:6px 11px;cursor:pointer}
.linkchip:hover{border-color:var(--accent)}
.linkchip .ic{color:var(--ink-faint)}
.thumb{height:46px;border-radius:8px;border:1px solid var(--line);cursor:zoom-in;object-fit:cover}
.datastat{font-family:var(--mono);font-size:12.5px;color:var(--ink-muted);border:1px solid var(--line);border-radius:8px;padding:6px 11px;background:var(--surface)}
.datastat b{color:var(--ink);font-weight:600}

footer{grid-column:1/-1;border-top:1px solid var(--line);padding:14px 28px;font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);text-align:center}

dialog.lightbox{border:none;background:transparent;max-width:92vw;max-height:92vh;padding:0}
dialog.lightbox::backdrop{background:color-mix(in oklch,var(--ink) 78%,transparent)}
dialog.lightbox img{max-width:92vw;max-height:86vh;border-radius:10px}
dialog.lightbox .cap{color:var(--paper);text-align:center;font-size:13px;margin-top:.5rem;font-family:var(--mono)}

@media (max-width:860px){
  .wrap{grid-template-columns:1fr}
  .col-left{position:static;border-right:none;border-bottom:1px solid var(--line)}
}
</style>
</head>
<body>

<div class="banner" id="banner">连接断开 · 进程可能已收尾。数据仍保存在磁盘上。</div>
<div class="topline"><i id="topfill"></i></div>

<header>
  <div class="h-left">
    <span class="h-title" id="h-title">helm</span>
    <span class="h-task" id="h-task"></span>
  </div>
  <div class="h-right">
    <span class="h-stat" id="h-state"></span>
    <span class="h-stat" id="h-upd"></span>
    <button class="iconbtn" id="btn-theme" title="切换主题">◐</button>
    <button class="iconbtn" id="btn-pause" title="暂停自动刷新">⏸</button>
  </div>
</header>

<div class="empty" id="empty">等待数据… 进程已就绪。<br>用 <code>helm status / step / event …</code> 开始更新这块看板。</div>

<div class="wrap" id="wrap" style="display:none">
  <aside class="col-left">
    <div id="l-top"></div>

    <section class="steer" id="l-steer" style="display:none">
      <div class="eyebrow">✎ 你的操舵 · 可编辑</div>
      <div class="field">
        <label>目标</label>
        <div class="box goal" id="f-goal" contenteditable="true" data-ph="这个任务要达成什么…"></div>
      </div>
      <div class="field">
        <label>操舵指令</label>
        <div class="box steer-note" id="f-steer" contenteditable="true" data-ph="给 agent 的方向 / 约束，如「先跑 staging」「别动 schema」…"></div>
      </div>
      <div class="steer-foot" id="steer-foot">
        <span class="hint" id="steer-hint"><span class="d"></span>—</span>
        <button class="savebtn" id="steer-save">保存</button>
      </div>
    </section>

    <div id="l-needs"></div>
  </aside>

  <main class="col-right" id="r-main"></main>
  <footer id="foot"></footer>
</div>

<dialog class="lightbox" id="lightbox"><img alt=""><div class="cap"></div></dialog>
